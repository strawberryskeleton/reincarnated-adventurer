<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quests | Town Guild</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./main.js" defer></script>
</head>
<body>
    <!-- HEADER -->
    <header></header>
    
    <!-- MAIN -->
    <main>
        <div class="text-dialog-box intro-text">

            <div class="profile">
                <div class="profile-img">
                    <img src="./assets/guild-master-profile.png" alt="guild master profile">
                </div>
                <div class="profile-name">Genya Halalala</div>
            </div>

            <div class="dialog">
                <p>Hi Adventurer!</p>
                <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Nisi in maxime beatae expedita natus animi.</p>
            </div>
        </div>


        <div class="text-dialog-box quest-text" id="quest-box">

            <div class="profile">
                <div class="profile-img">
                    <img src="./assets/guild-master-profile.png" alt="guild master profile">
                </div>
                <div class="profile-name">Genya Halalala</div>
            </div>

            <div class="dialog">
                <p class="dialog-title">Your Quest Is:</p>

                <div class="quest-info">
                    <p>Title:  <span id="qtitle">something someting</span></p>
                    <p>Category:  <span id="qtitle">something else</span></p>
                    <p>Difficulty:  <span id="qtitle">3</span></p>
                    <p>XP:  <span id="qtitle">25</span></p>
                </div>

                <div class="gen-btn">
                    <button id="generate-btn">Get Quest</button>
                </div>

            </div>
        </div>


    </main>

    <!-- FOOTER -->
    <footer></footer>

</body>
</html>
